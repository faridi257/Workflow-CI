name: Fashion Retail ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: "3.10"
          activate-environment: fashion_retail_env
          environment-file: conda.yaml

      - name: Run Modelling Script
        shell: bash -l {0}
        run: |
          conda activate fashion_retail_env
          python modelling.py
